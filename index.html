<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KupaMag</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,300;1,400&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --bg: #0d0d0d; --bg2: #141414; --bg3: #1c1c1c;
      --border: #2a2a2a; --text: #e8e4dc; --text-muted: #7a7570; --text-dim: #4a4540;
      --accent: #c9a84c;
      --serif: 'Playfair Display', Georgia, serif;
      --body-serif: 'Source Serif 4', Georgia, serif;
      --sans: 'IBM Plex Sans', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: var(--body-serif); min-height: 100vh; }
    header { border-bottom: 1px solid var(--border); background: var(--bg); position: sticky; top: 0; z-index: 100; }
    .header-inner { max-width: 1200px; margin: 0 auto; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 60px; }
    .site-name { font-family: var(--serif); font-size: 1.6rem; font-weight: 900; letter-spacing: -0.02em; color: var(--text); text-decoration: none; }
    .site-name span { color: var(--accent); }
    nav a { font-family: var(--sans); font-size: 0.78rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); text-decoration: none; margin-left: 28px; transition: color 0.2s; }
    nav a:hover { color: var(--accent); }
    .hero { max-width: 1200px; margin: 0 auto; padding: 48px 24px 0; }
    .hero-card { display: grid; grid-template-columns: 1fr 420px; gap: 0; border: 1px solid var(--border); cursor: pointer; transition: border-color 0.2s; margin-bottom: 48px; }
    .hero-card:hover { border-color: var(--accent); }
    .hero-content { padding: 40px 44px; background: var(--bg2); display: flex; flex-direction: column; justify-content: space-between; }
    .hero-image { background: var(--bg3); overflow: hidden; min-height: 360px; }
    .hero-image img { width: 100%; height: 100%; object-fit: cover; opacity: 0.85; filter: grayscale(20%); }
    .hero-image .placeholder { width: 100%; height: 100%; min-height: 360px; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #1a1a1a 0%, #222 100%); }
    .hero-category { font-family: var(--sans); font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.15em; color: var(--accent); margin-bottom: 16px; }
    .hero-title { font-family: var(--serif); font-size: 2.4rem; font-weight: 900; line-height: 1.15; letter-spacing: -0.02em; color: var(--text); margin-bottom: 20px; }
    .hero-excerpt { font-size: 1.05rem; font-weight: 300; line-height: 1.65; color: #b0a89e; font-style: italic; flex: 1; margin-bottom: 24px; }
    .hero-meta { font-family: var(--sans); font-size: 0.72rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; }
    .section-divider { max-width: 1200px; margin: 0 auto; padding: 0 24px 20px; display: flex; align-items: center; gap: 16px; }
    .section-divider span { font-family: var(--sans); font-size: 0.68rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.14em; color: var(--text-muted); white-space: nowrap; }
    .section-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .grid { max-width: 1200px; margin: 0 auto; padding: 0 24px 64px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--border); border: 1px solid var(--border); }
    .card { background: var(--bg); padding: 28px 28px 24px; cursor: pointer; transition: background 0.2s; }
    .card:hover { background: var(--bg2); }
    .card-image { width: 100%; aspect-ratio: 16/9; object-fit: cover; margin-bottom: 20px; opacity: 0.85; filter: grayscale(15%); }
    .card-image-placeholder { width: 100%; aspect-ratio: 16/9; background: var(--bg3); margin-bottom: 20px; }
    .card-category { font-family: var(--sans); font-size: 0.65rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.14em; color: var(--accent); margin-bottom: 10px; }
    .card-title { font-family: var(--serif); font-size: 1.2rem; font-weight: 700; line-height: 1.3; color: var(--text); margin-bottom: 10px; letter-spacing: -0.01em; }
    .card-excerpt { font-size: 0.88rem; line-height: 1.6; color: var(--text-muted); font-weight: 300; margin-bottom: 16px; }
    .card-meta { font-family: var(--sans); font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; border-top: 1px solid var(--border); padding-top: 14px; }
    .empty { text-align: center; padding: 80px 24px; color: var(--text-muted); font-family: var(--sans); font-size: 0.9rem; }
    .empty strong { display: block; font-family: var(--serif); font-size: 1.5rem; color: var(--text); margin-bottom: 12px; }
    footer { border-top: 1px solid var(--border); padding: 24px; text-align: center; font-family: var(--sans); font-size: 0.72rem; color: var(--text-dim); }
    @media (max-width: 900px) { .hero-card { grid-template-columns: 1fr; } .hero-image { min-height: 220px; } .hero-title { font-size: 1.8rem; } .grid { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } .hero-content { padding: 28px 24px; } }
  </style>
</head>
<body>
<header>
  <div class="header-inner">
    <a href="/kupamag/" class="site-name">Kupa<span>Mag</span></a>
    <nav>
      <a href="/kupamag/">Ana Sayfa</a>
      <a href="/kupamag/admin/">Yönetim</a>
    </nav>
  </div>
</header>
<div id="app"></div>
<footer><span id="footer-site-name">KupaMag</span> — Tüm hakları saklıdır.</footer>
<script>
const GITHUB_USER = 'yugofutbol-afk';
const GITHUB_REPO = 'kupamag';
const SITE_NAME   = 'KupaMag';

async function loadPosts() {
  const url = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/_posts`;
  let files = [];
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error();
    files = await res.json();
  } catch {
    renderEmpty('GitHub bilgileri henüz ayarlanmamış.');
    return;
  }
  const posts = [];
  for (const file of files.filter(f => f.name.endsWith('.md')).reverse()) {
    const r = await fetch(file.download_url);
    const raw = await r.text();
    posts.push(parseFrontmatter(raw, file.name));
  }
  if (posts.length === 0) { renderEmpty(); return; }
  renderPage(posts);
}

function parseFrontmatter(raw, filename) {
  const match = raw.match(/^---\n([\s\S]*?)\n---\n?([\s\S]*)$/);
  const meta = {};
  let body = raw;
  if (match) {
    match[1].split('\n').forEach(line => {
      const [k, ...v] = line.split(':');
      if (k) meta[k.trim()] = v.join(':').trim().replace(/^["']|["']$/g,'');
    });
    body = match[2];
  }
  const slug = filename.replace(/^\d{4}-\d{2}-\d{2}-/, '').replace('.md','');
  const excerpt = meta.excerpt || body.replace(/[#*`]/g,'').slice(0,120).trim() + '…';
  return { ...meta, slug, body, excerpt, filename };
}

function formatDate(d) {
  if (!d) return '';
  return new Date(d).toLocaleDateString('tr-TR', { day: 'numeric', month: 'long', year: 'numeric' });
}

function renderEmpty(msg) {
  document.getElementById('app').innerHTML = `<div class="empty"><strong>Henüz yazı yok</strong>${msg || 'Admin panelinden ilk yazını ekle.'}</div>`;
}

function renderPage(posts) {
  const [hero, ...rest] = posts;
  let html = `
  <div class="hero">
    <div class="hero-card" onclick="openPost('${hero.slug}')">
      <div class="hero-content">
        <div>
          <div class="hero-category">${hero.category || 'Genel'}</div>
          <h1 class="hero-title">${hero.title || 'Başlıksız'}</h1>
          <p class="hero-excerpt">${hero.excerpt}</p>
        </div>
        <div class="hero-meta">${formatDate(hero.date)}</div>
      </div>
      <div class="hero-image">
        ${hero.image ? `<img src="${hero.image}" alt="${hero.title}">` : `<div class="placeholder"></div>`}
      </div>
    </div>
  </div>`;
  if (rest.length > 0) {
    html += `<div class="section-divider"><span>Son Yazılar</span></div><div class="grid">`;
    for (const p of rest) {
      html += `<div class="card" onclick="openPost('${p.slug}')">
        ${p.image ? `<img class="card-image" src="${p.image}" alt="${p.title}">` : `<div class="card-image-placeholder"></div>`}
        <div class="card-category">${p.category || 'Genel'}</div>
        <h2 class="card-title">${p.title || 'Başlıksız'}</h2>
        <p class="card-excerpt">${p.excerpt}</p>
        <div class="card-meta">${formatDate(p.date)}</div>
      </div>`;
    }
    html += `</div>`;
  }
  document.getElementById('app').innerHTML = html;
}

function openPost(slug) {
  window.location.href = `/kupamag/post/?slug=${slug}`;
}

loadPosts();
</script>
</body>
</html>
