<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Yazı</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,300;1,400&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --bg: #0d0d0d;
      --bg2: #141414;
      --bg3: #1c1c1c;
      --border: #2a2a2a;
      --text: #e8e4dc;
      --text-muted: #7a7570;
      --text-dim: #4a4540;
      --accent: #c9a84c;
      --serif: 'Playfair Display', Georgia, serif;
      --body-serif: 'Source Serif 4', Georgia, serif;
      --sans: 'IBM Plex Sans', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: var(--body-serif); }

    header {
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 100; background: var(--bg);
    }
    .header-inner {
      max-width: 1200px; margin: 0 auto; padding: 0 24px;
      display: flex; align-items: center; justify-content: space-between; height: 60px;
    }
    .site-name {
      font-family: var(--serif); font-size: 1.6rem; font-weight: 900;
      letter-spacing: -0.02em; color: var(--text); text-decoration: none;
    }
    .site-name span { color: var(--accent); }
    .back-btn {
      font-family: var(--sans); font-size: 0.78rem; font-weight: 500;
      text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted);
      text-decoration: none; transition: color 0.2s;
    }
    .back-btn:hover { color: var(--accent); }

    .article-wrap {
      max-width: 720px; margin: 0 auto; padding: 56px 24px 96px;
    }

    .article-category {
      font-family: var(--sans); font-size: 0.7rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.15em; color: var(--accent);
      margin-bottom: 20px;
    }

    .article-title {
      font-family: var(--serif); font-size: 2.8rem; font-weight: 900;
      line-height: 1.1; letter-spacing: -0.025em; color: var(--text);
      margin-bottom: 20px;
    }

    .article-meta {
      font-family: var(--sans); font-size: 0.72rem; color: var(--text-dim);
      text-transform: uppercase; letter-spacing: 0.08em;
      padding-bottom: 28px; border-bottom: 1px solid var(--border);
      margin-bottom: 40px;
    }

    .article-hero-img {
      width: 100%; max-height: 480px; object-fit: cover;
      margin-bottom: 40px; opacity: 0.9;
      filter: grayscale(10%);
    }

    .article-body { font-size: 1.1rem; line-height: 1.85; font-weight: 300; color: #ccc5bb; }
    .article-body h1, .article-body h2, .article-body h3 {
      font-family: var(--serif); color: var(--text); margin: 2em 0 0.6em;
      letter-spacing: -0.01em;
    }
    .article-body h2 { font-size: 1.7rem; }
    .article-body h3 { font-size: 1.3rem; }
    .article-body p { margin-bottom: 1.5em; }
    .article-body strong { color: var(--text); font-weight: 600; }
    .article-body em { font-style: italic; color: #b8b0a6; }
    .article-body a { color: var(--accent); text-decoration: underline; }
    .article-body blockquote {
      border-left: 3px solid var(--accent); margin: 2em 0;
      padding: 4px 0 4px 24px;
      font-style: italic; color: #a09890; font-size: 1.15rem; line-height: 1.7;
    }
    .article-body ul, .article-body ol {
      padding-left: 1.5em; margin-bottom: 1.5em;
    }
    .article-body li { margin-bottom: 0.4em; }
    .article-body img { max-width: 100%; margin: 1em 0; }
    .article-body code {
      background: var(--bg3); padding: 2px 6px;
      font-size: 0.85em; border-radius: 3px; font-family: monospace;
    }
    .article-body pre {
      background: var(--bg3); padding: 16px; overflow-x: auto;
      margin: 1.5em 0; border-radius: 4px;
    }

    .loading {
      text-align: center; padding: 80px 24px;
      color: var(--text-muted); font-family: var(--sans);
    }

    footer {
      border-top: 1px solid var(--border); padding: 24px;
      text-align: center; font-family: var(--sans);
      font-size: 0.72rem; color: var(--text-dim);
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="<a href="/kupamag/">← Geri Dön</a>" class="site-name" id="site-name-link">Yazı<span>lar</span></a>
    <a href="<a href="/kupamag/">← Geri Dön</a>" class="back-btn">← Geri Dön</a>
  </div>
</header>

<div id="app"><div class="loading">Yükleniyor…</div></div>

<footer><span id="footer-site-name">Blog</span> — Tüm hakları saklıdır.</footer>

<script>
const GITHUB_USER = 'yugofutbol-afk';
const GITHUB_REPO = 'kupamag';
const SITE_NAME   = 'KupaMag';

document.querySelector('.site-name').innerHTML = SITE_NAME.slice(0,-3) + '<span>' + SITE_NAME.slice(-3) + '</span>';
document.getElementById('footer-site-name').textContent = SITE_NAME;

const slug = new URLSearchParams(window.location.search).get('slug');

async function loadPost() {
  if (!slug) { document.getElementById('app').innerHTML = '<div class="loading">Yazı bulunamadı.</div>'; return; }

  const listUrl = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/_posts`;
  const res = await fetch(listUrl);
  const files = await res.json();
  const match = files.find(f => f.name.endsWith('.md') && f.name.includes(slug));
  if (!match) { document.getElementById('app').innerHTML = '<div class="loading">Yazı bulunamadı.</div>'; return; }

  const r = await fetch(match.download_url);
  const raw = await r.text();
  const post = parse(raw);
  document.title = post.title || 'Yazı';
  render(post);
}

function parse(raw) {
  const m = raw.match(/^---\n([\s\S]*?)\n---\n?([\s\S]*)$/);
  const meta = {};
  let body = raw;
  if (m) {
    m[1].split('\n').forEach(line => {
      const [k,...v] = line.split(':');
      if (k) meta[k.trim()] = v.join(':').trim().replace(/^["']|["']$/g,'');
    });
    body = m[2];
  }
  return { ...meta, body };
}

function formatDate(d) {
  if (!d) return '';
  return new Date(d).toLocaleDateString('tr-TR', { day: 'numeric', month: 'long', year: 'numeric' });
}

function render(post) {
  document.getElementById('app').innerHTML = `
    <div class="article-wrap">
      <div class="article-category">${post.category || 'Genel'}</div>
      <h1 class="article-title">${post.title || 'Başlıksız'}</h1>
      <div class="article-meta">${formatDate(post.date)}</div>
      ${post.image ? `<img class="article-hero-img" src="${post.image}" alt="${post.title}">` : ''}
      <div class="article-body">${marked.parse(post.body || '')}</div>
    </div>`;
}

loadPost();
</script>
</body>
</html>
